minimumLimaVersion: 2.0.0

base:
  - template:_images/ubuntu-24.04

vmType: vz
os: Linux
cpus: 2
memory: "2GiB"
disk: "10GiB"

networks:
  - vzNAT: true

mounts:
  - location: "."
    mountPoint: "/workspaces/{{.Name}}"
    writable: true

containerd:
  system: false
  user: false
  archives: []

provision:
  - mode: system
    script: |
      #!/bin/bash

      set -eux -o pipefail

      apt-get update
      apt-get upgrade -y
  - mode: user
    script: exec '/workspaces/{{.Name}}/lima/provision.sh' '/workspaces/{{.Name}}' '{{.Param.sentinelId}}'
