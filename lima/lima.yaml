vmType: vz
os: Linux
cpus: 2
memory: "2GiB"
disk: "10GiB"

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-\
      server-cloudimg-arm64.img"
    arch: aarch64
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-\
      server-cloudimg-amd64.img"
    arch: x86_64

networks:
  - vzNAT: true

mounts:
  - location: "."
    mountPoint: "/workspaces/{{.Name}}"
    writable: true

provision:
  - mode: system
    script: |
      apt-get update
      apt-get upgrade -y
  - mode: user
    script: |
      mkdir -p '/workspaces/{{.Name}}/.claude/global'
      ln -s '/workspaces/{{.Name}}/.claude/global/' ~/.claude
      ln -s '/workspaces/{{.Name}}/.claude/global/claude.json' ~/.claude.json
      echo 'export PATH="$HOME/.local/bin:$PATH"' >> ~/.bashrc && source ~/.bashrc
      curl -fsSL https://claude.ai/install.sh | bash
      echo 'cd /workspaces/{{.Name}} 2>/dev/null || true' >> ~/.bashrc
